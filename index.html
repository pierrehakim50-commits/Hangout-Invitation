<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #fdf6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
    width: 90%;
    max-width: 500px;
}

h1 {
    text-align: center;
}

.section {
    margin: 20px 0;
}

button {
    background: #ff6b9a;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    opacity: .9;
}

#result {
    display: none;
    margin-top: 20px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">

<h1>💌 A Question For You</h1>

<p>Would you like to go on a date with me?</p>

<div class="section">
<label><input type="radio" name="answer" value="Yes"> Yes 😊</label><br>
<label><input type="radio" name="answer" value="Maybe"> Maybe 🤔</label><br>
<label><input type="radio" name="answer" value="No"> No Thanks 🙂</label>
</div>

<div class="section">
<h3>Pick a Day</h3>
<input type="date" id="date">
</div>

<div class="section">
<h3>Choose an Activity</h3>
<select id="activity">
<option>Coffee ☕</option>
<option>Dinner 🍝</option>
<option>Movie 🎬</option>
<option>Ice Cream 🍦</option>
<option>Surprise Me 🎁</option>
</select>
</div>

<div class="section">
<h3>Favorite Food</h3>
<input type="text" id="food" placeholder="Type here..." style="width:100%;padding:10px;">
</div>

<button onclick="submitForm()">Submit ❤️</button>

<div id="result"></div>

</div>

<script>
function submitForm() {

const answer = document.querySelector('input[name="answer"]:checked');

if(!answer){
    alert("Please choose an answer first 😊");
    return;
}

const date = document.getElementById("date").value;
const activity = document.getElementById("activity").value;
const food = document.getElementById("food").value;

document.getElementById("result").style.display = "block";
document.getElementById("result").innerHTML =
`
<h3>Response Submitted ❤️</h3>
<p><strong>Answer:</strong> ${answer.value}</p>
<p><strong>Date:</strong> ${date || "Not selected"}</p>
<p><strong>Activity:</strong> ${activity}</p>
<p><strong>Food:</strong> ${food || "Not specified"}</p>
<p>Your response has been delivered directly to Pierre's heart.</p>
`;
}
</script>

</body>
</html>
